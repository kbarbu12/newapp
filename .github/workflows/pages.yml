name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Gate the live deploy on the quest-data audit — a data bug (dup IDs,
      # missing fields, dup titles, malformed/reused videos, quests hidden from
      # their sub-filter) fails the build before anything ships.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit quest data
        working-directory: ps5-rpg-sidequest-summarizer
        run: node scripts/audit.js
      # Build the redesign into two bundles from one codebase:
      #   staging/ — every tab visible, for reviewing the whole redesign
      #   app/     — only tabs promoted in src/config/promotion.ts
      # Both read the same live quest data (redesign/scripts/gen-data.mjs).
      - name: Install redesign deps
        working-directory: redesign
        run: npm ci
      - name: Build redesign (staging + promoted prod)
        working-directory: redesign
        run: |
          npm run build:staging
          npm run build:prod
      # Assemble the published site: the vanilla app stays at the root
      # (/newapp/) untouched; the redesign bundles mount alongside it.
      - name: Assemble site
        run: |
          rm -rf _site
          cp -r ps5-rpg-sidequest-summarizer _site
          cp -r redesign/dist/staging _site/staging
          cp -r redesign/dist/app _site/app
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
          # unique per attempt so re-running a failed run doesn't create
          # a duplicate "github-pages" artifact, which breaks deploy-pages
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
      # GitHub Pages' publish API intermittently returns "Deployment failed,
      # try again later" even when the build + artifact upload succeed. The
      # first attempt is tolerated (continue-on-error) and retried once after a
      # short pause, so a transient flake no longer fails the whole deploy.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Wait before retrying deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
