name: Audit quest data

# Runs the quest-data integrity audit (scripts/audit.js) on every pull request
# so a bad edit — duplicate IDs, missing fields, duplicate titles, malformed or
# reused videos, or a quest hidden from its own sub-filter — fails the check
# before it can be merged. The same audit also gates the live deploy (see
# pages.yml). Errors exit non-zero; the coverage table is printed for reference.

on:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run quest-data audit
        working-directory: ps5-rpg-sidequest-summarizer
        run: node scripts/audit.js
