<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="60%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="220" fill="#6c8cff" opacity="0.07" filter="url(#glow)"/>
  <circle cx="1050" cy="500" r="180" fill="#c084fc" opacity="0.07" filter="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#6c8cff" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="120" rx="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="116" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="86" font-weight="900" fill="white" opacity="0.95">RPG Quest Guide</text>

  <!-- Tagline -->
  <text x="116" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="400" fill="white" opacity="0.55">Your guide to the best RPG side quests</text>

  <!-- Stats row -->
  <rect x="116" y="380" width="180" height="64" rx="10" fill="#6c8cff" opacity="0.15"/>
  <text x="206" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#6c8cff">111</text>
  <text x="206" y="432" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" opacity="0.5">Quests</text>

  <rect x="316" y="380" width="180" height="64" rx="10" fill="#c084fc" opacity="0.15"/>
  <text x="406" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#c084fc">15</text>
  <text x="406" y="432" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" opacity="0.5">Games</text>

  <rect x="516" y="380" width="220" height="64" rx="10" fill="#4ade80" opacity="0.12"/>
  <text x="626" y="407" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#4ade80">100%</text>
  <text x="626" y="432" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" opacity="0.5">Free</text>

  <!-- Game names -->
  <text x="116" y="510" font-family="system-ui,sans-serif" font-size="18" fill="white" opacity="0.3">Elden Ring · Baldur's Gate 3 · The Witcher 3 · Cyberpunk 2077 · Ghost of Tsushima · and more</text>

  <!-- URL -->
  <text x="1184" y="600" text-anchor="end" font-family="system-ui,sans-serif" font-size="18" fill="white" opacity="0.25">kbarbu12.github.io</text>
</svg>
