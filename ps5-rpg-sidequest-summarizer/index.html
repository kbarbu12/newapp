<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Quests and Walkthroughs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <nav class="topnav">
      <span class="nav-brand">QuestDB</span>
      <button id="mobileFilterToggle" class="nav-toggle" type="button" aria-label="Toggle filters">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M5 10h10M7 15h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Filters
      </button>
    </nav>

    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">Game Quests and Walkthroughs</p>
        <h1>Discover the Best<br />RPG Side Quests</h1>
        <p class="subtitle">
          Browse, filter, and explore side quests and video walkthroughs from popular RPG games.
        </p>
        <div class="hero-search">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2"/><path d="M14 14l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="searchInput" type="search" placeholder="Search quests, games, rewards..." />
        </div>
      </div>
    </header>

    <main class="layout">
      <aside id="filterPanel" class="panel controls" aria-label="Quest filters">
        <div class="filter-header">
          <h3>Filters</h3>
          <button id="resetButton" type="button" class="btn-reset">Clear all</button>
        </div>

        <div class="filter-group">
          <label for="gameFilter">Game</label>
          <select id="gameFilter">
            <option value="all">All games</option>
          </select>
        </div>

        <div id="subFilterContainer"></div>

        <div id="videoFilterGroup" class="filter-group" style="display:none;">
          <label for="videoFilter">Walkthrough</label>
          <select id="videoFilter">
            <option value="all">All quests</option>
            <option value="video">With video walkthrough</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="lengthFilter">Quest length</label>
          <select id="lengthFilter">
            <option value="all">Any length</option>
            <option value="short">Short</option>
            <option value="medium">Medium</option>
            <option value="long">Long</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="difficultyFilter">Difficulty</label>
          <select id="difficultyFilter">
            <option value="all">Any difficulty</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
      </aside>

      <section class="content">
        <div class="results-header">
          <h2>Quest Library</h2>
          <span id="resultCount" class="result-count"></span>
        </div>
        <div id="questGrid" class="quest-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer>
      <p>Game Quests and Walkthroughs &mdash; Your guide to the best RPG side quests.</p>
    </footer>

    <script src="data/quests.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
